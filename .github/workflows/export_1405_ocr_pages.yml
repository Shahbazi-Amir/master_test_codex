name: Export 1405 OCR pages

on:
  push:
    branches: [main]
    paths:
      - tools/export_1405_ocr_pages.py
      - .github/workflows/export_1405_ocr_pages.yml
      - data/diagnostics/exam_1405_pdf_analysis.json
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Export page text files
        run: python tools/export_1405_ocr_pages.py

      - name: Commit page text files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/diagnostics/ocr_pages
          if git diff --cached --quiet; then
            echo "No OCR page changes"
          else
            git commit -m "Export 1405 OCR page text"
            git push
          fi
