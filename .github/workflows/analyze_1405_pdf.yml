name: Analyze 1405 exam PDF

on:
  push:
    branches: [main]
    paths:
      - assets/source/arshad_bargh_1405_1251.pdf
      - tools/analyze_exam_1405_pdf.py
      - .github/workflows/analyze_1405_pdf.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install PDF tools
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Analyze PDF
        run: python tools/analyze_exam_1405_pdf.py

      - name: Commit diagnostic output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/diagnostics/exam_1405_pdf_analysis.json
          if git diff --cached --quiet; then
            echo "No diagnostic changes"
          else
            git commit -m "Analyze 1405 exam PDF"
            git push
          fi
