name: Scan 1405 question markers

on:
  push:
    branches: [main]
    paths:
      - tools/scan_1405_question_markers.py
      - .github/workflows/scan_1405_question_markers.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install OCR tools
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils tesseract-ocr tesseract-ocr-fas
          python -m pip install Pillow

      - name: Scan page margins
        run: python tools/scan_1405_question_markers.py

      - name: Commit scans
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/diagnostics/marker_scans
          if git diff --cached --quiet; then
            echo "No marker scan changes"
          else
            git commit -m "Scan 1405 question markers"
            git push
          fi
