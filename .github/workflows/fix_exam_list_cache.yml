name: Fix stale exam list cache

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/fix_exam_list_cache.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove stale exam-list cache
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('master_exam_ui.py')
          text = path.read_text(encoding='utf-8')
          old = '@st.cache_data\ndef load_exams():'
          new = 'def load_exams():'
          if old not in text:
              raise SystemExit('load_exams cache decorator not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          Path('.github/workflows/fix_exam_list_cache.yml').unlink()
          PY
      - name: Validate and commit
        run: |
          python -m py_compile master_exam_ui.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add master_exam_ui.py .github/workflows/fix_exam_list_cache.yml
          git commit -m "Refresh exam list after new data files"
          git push
